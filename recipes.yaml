- name: Beef Noodles
  ingredients:
    - Sesame seed 1 tbsp
    - Noodles 2 nests
    - Beef strips 500 g
    - Pepper 1 medium
    - Garlic 2 cloves
    - Spring onion 1 bunch
    - White wine 50 ml
    - Soy sauce 50 ml
  instructions: |
    1) Toast the sesame seeds in a pan until golden brown. Set aside.

    2) Start boiling the water for the noodles.

    3) Brown the beef and pepper in a wok. Add the garlic, spring onions, wine and soy sauce.

    4) Cook the noodles once the water is boiling.
- name: Beef Stew
  ingredients:
    - Beef stock 1 cube
    - Tomato puree 2 tbsp
    - Yeast extract 1 tbsp
    - Braising steak 900 g
    - Bacon lardons 100 g
    - Onion 2 medium
    - Carrots 400 g
    - Plain flour 3 tbsp
    - Herbs 1 tsp
    - Bay leaf 1 unit
    - Potato 300 g
    - Butter 50 g
    - Milk 50 ml
  instructions: |
    1) Pour the just-boiled water into a heatproof measuring jug, add the stock cube, tomato puree and yeast extract. Stir well until the cube has dissolved and set aside.

    2) Put the beef, bacon and vegetables in a slow cooker, sprinkle over the flour and add the salt, herbs and plenty of freshly ground black pepper. Toss together. Add the stock mixture and stir well.

    3) Cover with the lid and cook on low for 8-10 hours, until the beef and vegetables are tender. Serve with mashed potatoes.
- name: Beef Stroganoff
  ingredients:
    - Oil 1 tbsp
    - Onion 1 medium
    - Garlic 1 clove
    - Butter 1 tbsp
    - Mushrooms 250 g
    - Plain flour 1 tbsp
    - Fillet steak 500 g
    - Creme fraiche 150 g
    - Mustard 1 tsp
    - Beef stock 100 ml
    - Parsley 0.5 pack
  instructions: |
    1) Heat 1 tbsp olive oil in a non-stick frying pan then add 1 sliced onion and cook on a medium heat until completely softened, around 15 mins, adding a little splash of water if it starts to stick.

    2) Crush in 1 garlic clove and cook for 2-3 mins more, then add 1 tbsp butter.

    3) Once the butter is foaming a little, add 250g sliced mushrooms and cook for around 5 mins until completely softened.

    4) Season everything well, then tip onto a plate.

    5) Tip 1 tbsp plain flour into a bowl with a big pinch of salt and pepper, then toss 500g sliced fillet steak in the seasoned flour.

    6) Add the steak pieces to the pan, splashing in a little oil if the pan looks dry, and fry for 3-4 mins, until well coloured.

    7) Tip the onions and mushrooms back into the pan. Whisk 150g crème fraîche, 1 tsp English mustard and 100ml beef stock together, then stir into the pan.

    8) Cook over a medium heat for around 5 mins. Scatter with some chopped parsley, and serve with pappardelle or rice.
- name: Bolognese
  ingredients:
    - Mince 750 g
    - Oil 2 tbsp
    - Onion 1 medium
    - Carrots 2 large
    - Rosemary 1 tsp
    - Cloves 3 units
    - Garlic 2 cloves
    - Chopped tomato 2 tin
    - Tomato puree 2 tbsp
    - Basil 1 tsp
    - Oregano 1 tsp
    - Bay leaf 2 unit
    - Beef stock 1 cube
    - Red wine 125 ml
    - Parmesan 75 g
    - Pasta 140 g
  instructions: |
    1) Soften the onions and carrots in a large saucepan along with the cloves. Add the garlic and the rosemary after 5 minutes. Continue to cook until the veg is softened.

    2) Brown the mince in a frying pan in batches. Add to the veg.

    3) And the chopped tomatoes, basil, oregano, bay leaves, tomato puree, beef stock cube and red wine.

    4) Bring to the boil, reduce to a gentle simmer and cover with a lid. Cook for 1 hr 15 mins stirring occasionally, until you have a rich, thick sauce.

    5) Add the 75g grated parmesan, check the seasoning and stir.

    6) When the bolognese is nearly finished, cook the spaghetti following the pack instructions.
- name: Stir Fry Chinese
  ingredients:
    - Noodles 2 nests
    - Chicken breast 250 g
    - Pak Choi 1 unit
    - Tenderstem 100 g
    - Black bean sauce 1 packet
    - Pepper 1 medium
  instructions: |
    1) Toast the cashew nuts under the grill and set aside

    2) Start boiling the water for the noodles.

    3) Brown the onion, pepper and mushrooms in a heated pan.

    4) Cook the noodles once the water is boiling.

    5) Add the leftover chicken and brown.

    6) With 3 minutes remaining add the cashews and sauce packet. Simmer until the noodles are finished.
- name: Cheesy Pasta Bake
  ingredients:
    - Pasta 400 g
    - Oil 1 tbsp
    - Chicken breasts 2 large
    - Onion 1 large
    - Pepper 2 medium
    - Garlic 2 cloves
    - Tomato Puree 1 tbsp
    - Oregano 0.5 tsp
    - Thyme 0.5 tsp
    - Chopped tomato 1 tin
    - Double cream 120 ml
    - Bacon 6 rashers
    - Cheddar cheese 100 g
    - Mozzarella 100 g
  instructions: |-
    1) Preheat the oven to 190c/375f. Boil a large pan of water and cook the pasta for 1 minute less than recommended on the pack. Drain.
    2) Whilst the pasta is cooking, heat the oil on a medium heat, in a large frying pan. Add the chicken, and cook until just sealed - about 5 minutes.
    3) Add the onion and cook for a further 3-4 minutes until the onion is softened. Add the chopped peppers, salt, pepper, garlic, tomato puree, oregano and thyme. Stir and cook for 2-3 minutes.
    4) Stir in the tinned tomatoes and cream, bring to a gentle bubble, then add the pasta, spinach and cooked bacon. Stir everything together, then transfer to a large baking dish.
    5) Top with the cheddar and mozzarella, and place in the oven for 20-25 minutes, until the cheese is golden brown.
    6) Take out of the oven and top with parsley before serving.
- name: Chicken Kiev
  ingredients:
    - Chicken kiev 2 unit
    - Broccoli 0.5 head
    - Green beans 50 g
    - Potato 200 g
    - Oil 2 tbsp
  instructions: |-
    1) Cook the Chicken Kievs according to the packet instructions.
    2) Cook the potatoes and veg as desired.
- name: Chicken Pesto Pasta
  ingredients:
    - Pasta 140 g
    - Onion 1 small
    - Oil 1 tsp
    - Chicken 200 g
    - Garlic 1 clove
    - Rosemary 0.5 tsp
    - Paprika 1 tsp
    - Pesto 1 tbsp
    - Double Cream 150 ml
    - Parmesan 8 tbsp
  instructions: |-
    1) Boil the pasta in salted water according to packet instructions.
    2) Meanwhile, fry off your onions in 1 teaspoon oil until onion is soft.
    3) Add chicken, and fry until it browns.
    4) Stir in chopped garlic, rosemary and paprika. Fry for about 1 minute, then add your pesto and cream, mixing well.
    5) Turn down heat and allow the mixture to slowly simmer, until the sauce darkens.
    6) Drain pasta and add to the sauce. Mix pasta and sauce gently so the pasta absorbs some of the sauce, then add Parmesan cheese and mix. Serve immediately.
- name: Chilli Con Carne
  ingredients:
    - Onion 1 large
    - Pepper 1 large
    - Garlic 2 cloves
    - Oil 1 tbsp
    - Chilli powder 1 tsp
    - Paprika 1 tsp
    - Cumin 1 tsp
    - Beef mince 750 g
    - Beef stock 1 unit
    - Marjoram 0.5 tsp
    - Chopped tomato 2 tin
    - Dark chocolate 1 square
    - Tomato puree 2 tbsp
    - Red kidney beans 1 tin
  instructions: |
    1) Chop the onion and start to soften over a low heat.

    2) Cut 1 red pepper and chop 2 garlic cloves.

    3) Tip in the garlic, red pepper, 1 heaped tsp hot chilli powder or 1 level tbsp mild chilli powder, 1 tsp paprika and 1 tsp ground cumin.

    4) Brown the mince in a separate pan and add to the onions.

    5) Add a 400g can of chopped tomatoes. Tip in ½ tsp dried marjoram, 1 tsp sugar, the beed stock, and add a good shake of salt and pepper. Squirt in about 2 tbsp tomato purée and stir the sauce well.

    6) Simmer it gently. Bring the whole thing to the boil, give it a good stir and put a lid on the pan. Turn down the heat until it is gently bubbling and leave it for 20 minutes.

    7) Check on the pan occasionally to stir it and make sure the sauce doesn't catch on the bottom of the pan or isn't drying out.

    8) Drain and rinse a 410g can of red kidney beans in a sieve and stir them into the chilli pot. Bring to the boil again, and gently bubble without the lid for another 10 minutes, adding a little more water if it looks too dry.

    9) Now replace the lid, turn off the heat and leave your chilli to stand for 10 minutes before serving.
- name: Coconut Curry
  ingredients:
    - Oil 2 tbsp
    - Chicken thighs 650 g
    - Onion 1 small
    - Garlic 3 clove
    - Curry powder 2 tbsp
    - Chicken stock 250 ml
    - Coconut milk 1 tin
    - Chopped tomato 1 tin
    - Tomato puree 2 tbsp
    - Sugar 2 tbsp
    - Rice 135 g
    - naan 1 unit
  instructions: |
    1) Heat some oil in a large pan and then add the onion.

    2) Once softened, add the garlic and spices. Fry for a minute then add the chopped tomato.

    3) Blend the mixture using a stick blender and then add: cononut milk, puree and sugar.

    4) In a separate pan, brown the chicken and then add it to the sauce

    5) Stir everything together, bring to a boil then cover with a lid. Turn the heat down and simmer for another 15 to 20 minutes.

    6) Serve over rice.
- name: Chicken Fajitas
  ingredients:
    - Oil 1 tbsp
    - Pepper 1 medium
    - Garlic 1 clove
    - Cooked chicken 230 g
    - Paprika 0.5 tsp
    - Cumin 0.5 tsp
    - Oregano 0.5 tsp
    - BBQ Sauce 100 ml
    - Tortillas 4 units
    - Lettuce 100 g
  instructions: |
    1) Chop the pepper and garlic.

    2) Fry the pepper on a medium to high heat. Once browned, turn the heat down and add the garlic.

    3) Add the cooked chicken and heat through. Meanwhile, chop and wash the lettuce and grate the cheese.

    4) Add the spices and BBQ sauce. Meanwhile, heat the tortillas in the microwave.
- name: Halloumi Fajitas
  ingredients:
    - Oil 1 tbsp
    - Pepper 1 medium
    - Garlic 1 clove
    - Halloumi 1 pack
    - Paprika 0.5 tsp
    - Cumin 0.5 tsp
    - Oregano 0.5 tsp
    - BBQ Sauce 100 ml
    - Tortillas 4 units
    - Lettuce 100 g
  instructions: |
    1) Chop the pepper and garlic.

    2) Fry the pepper on a medium to high heat. Once browned, turn the heat down and add the garlic.

    3) Fry the Halloumi

    4) Add the spices and BBQ sauce. Meanwhile, heat the tortillas in the microwave.
- name: Fish Cakes
  ingredients:
    - Fish Cakes 4 unit
    - Broccoli 0.5 head
    - Green beans 100 g
  instructions: |
    1) Cook the fish cakes according to the instructions on the packet.

    2) Chop the veg and place it in the steamer.

    3) Start the steamer when the fish cakes have 15 minutes left in the oven.
- name: Fish and Chips
  ingredients:
    - Breaded fish 2 unit
    - Potato 300 g
    - Green beans 100 g
  instructions: |
    1) Par boil the hand cut potato for 6 minutes. Drain and dry thoroughly.

    2) Place in an oiled baking sheet which has been pre-heating in a 230 C oven. Cook for 20 minutes.

    3) Reduce the oven to 180 C and place the fish inside.

    4) Once the fish is cooked, remove from the oven and wrap in foil. Increase the oven temperature to 230 C and wait until the chips are finished.

    5) Meanwhile, boil the green beans on the hob.
- name: Meatballs and Chips
  ingredients:
    - Meatballs 2 unit
    - Potato 300 g
    - Green beans 100 g
    - Double cream 35 ml
    - Ikea gravy 14 g
  instructions: |
    1) Par boil the hand cut potato for 6 minutes. Drain and dry thoroughly.

    2) Place in an oiled baking sheet which has been pre-heating in a 200 C oven. Cook for 35 minutes.

    3) With 10 minutes to go, start boiling the water for the beans and heating the water for the gravy.

    4) Put the beans on with 8 minutes to go and make the gravy.

    5) With 2 minutes to go, heat the meatballs in the microwave.
- name: Smelly Fish
  ingredients:
    - Cod Fillet 2 units
    - Potato 300 g
    - Green beans 100 g
    - Butter 50 g
  instructions: |-
    1) Par boil the chopped potato for 4 minutes. Drain and dry.
    2) Start frying the potato and after around 6 minutes start heating some butter in a pan.
    3) Fry the cod for around 10 minutes.
    4) Boil the beans with 8 minutes remaining.
- name: Hunters Chicken
  ingredients:
    - Chicken breast 400 g
    - Potatoes 400 g
    - Broccoli 0.5 head
    - Oil 4 tbsp
    - BBQ sauce 100 ml
    - Smoked paprika 1 tsp
  instructions: |
    1) Preheat the oven to 200C.

    2) Chop up some potato into small chunks and par boil for 4 minutes. Drain and dry.

    3) Smoother each chicken breast with BBQ sauce, smoked paprika, salt and pepper

    4) Place the chicken breast in the oven with a temperature probe inserted into the deepest part. Cook for approx 25 mins.

    5) Sautee the potato until golden brown.

    6) When 17 minutes is left on the chicken, put some veg onto steam.
- name: Beef Lasagne
  ingredients:
    - Lasagne 12 sheets
    - Cheddar cheese 75 g
    - Butter 50 g
    - Plain flour 50 g
    - Milk 750 ml
    - Dijon mustard 2 tsp
    - Parmesan 50 g
    - Oil 2 tbsp
    - Beef mince 900 g
    - Onions 2 large
    - Garlic 2 cloves
    - Beef stock 150 ml
    - Caster sugar 1 tsp
    - Tomato puree 3 tbsp
    - Thyme 1 tbsp
    - Chopped tomato 2 tins
  instructions: |
    1) Preheat the oven to160C/325F/Gas 3.

    2) For the ragu, heat a large frying pan until hot and add the oil. Cook the mince until browned all over. Remove from the heat and transfer to a plate. Add the onion, celery (if using) and garlic to the pan and cook until softened. Return the meat to the pan and stir in the flour. Add the stock and bring to the boil. Add the redcurrant jelly (or sugar), tomato purée and thyme, then stir well.

    3) Stir in the canned tomatoes. Bring to the boil again, cover and simmer in the oven for 1-½ hours, or until the beef is tender.

    4) For the white sauce, melt the butter in a saucepan. Add the flour and cook over the heat for one minute. Gradually whisk in the hot milk, whisking until thickened. Add the Dijon mustard and parmesan cheese and season well with salt and pepper.

    5) For the lasagne, put one third of the meat sauce in the base of a 2.3 litre/4 pint shallow ovenproof dish. Spoon one third of the white sauce on top. Arrange one layer of lasagne sheets on top. Season. Spoon half of the remaining meat sauce on top and then half of the white sauce. Put another layer of lasagne sheets on top, then the remaining meat sauce and remaining white sauce. Sprinkle over the cheddar cheese.

    6) Leave for six hours before cooking so that the pasta can start to soften.

    7) Preheat the oven temperature to 200C/400F/Gas 6.

    8) Cook in the middle of the oven for about 45 minutes- or until golden brown on top, bubbling around the edges and the pasta is soft.
- name: Peanut Curry
  ingredients:
    - Chicken thighs 650 g
    - Garlic 6 cloves
    - Lemongrass 3 stalks
    - Ginger 1 piece
    - Cumin 1 tbsp
    - Coriander 1 tbsp
    - Tumeric 1 tbsp
    - Limes 2 small
    - Chillies 2 small
    - Onion 1 small
    - Oil 2 tbsp
    - Peanut butter 100 g
    - Soy sauce 3 tbsp
    - Light brown sugar 1 tbsp
    - Coconut milk 1 tin
    - Rice 150 g
  instructions: |
    1) Put the chicken, chopped garlic, a third of the lemongrass and half the ginger, spices and lime juice in a large bowl. Toss, then cover and leave for 30 mins, or chill for up to 24 hrs.

    2) Blitz the whole garlic, the rest of the lemongrass and ginger, remaining spices, chopped chilli, onion and a large splash of water to in a food processor. Set aside.

    3) Heat the oil in a pan and brown the chicken all over. Set aside on a plate.

    4) Cook the paste for 8-10 mins until it splits. Stir in the peanut butter and kecap manis. When thickened, add the coconut milk and half a can of water, bring to a simmer, season, then add the chicken with its juices.

    5) Continue to simmer for 40 mins, stirring often. Turn off the heat, add the rest of the lime juice and season. Leave to rest for 10 mins. Scatter over the sliced chilli, spring onions, fresh coriander and peanuts to serve.
- name: Pizza
  ingredients:
    - Strong white flour 650 g
    - Yeast 7 g
    - Salt 2 tsp
    - Olive oil 25 ml
    - Milk 50 ml
    - Onion 1 small
    - Garlic 1 clove
    - Chopped tomato 2 tin
    - Tomato puree 3 tbsp
    - Bay leaf 1 unit
    - Oregano 2 tbsp
    - Brown sugar 2 tsp
    - Basil 1 bunch
  instructions: |
    1) To make the dough, mix the flour, yeast and salt together in a large bowl and stir in the olive oil and milk. Gradually add the water, mixing well to form a soft dough.

    2) Turn the dough out on to a floured surface and knead for about 5 minutes, until smooth and elastic. Transfer to a clean bowl, cover with a damp teatowel and leave to rise for about 1½ hours, until doubled in size.

    3) When the dough has risen, knock it back, then knead again until smooth, roll into a ball and set aside for 30 minutes to 1 hour until risen again.

    4) Heat the oil in a saucepan over a low heat, then add the onion along with a generous pinch of salt. Fry gently for 12-15 mins or until the onion has softened and is turning translucent. Add the garlic and fry for a further min. Tip in the tomatoes and purée along with the bay, oregano and sugar. Bring to the boil and lower the heat. Simmer, uncovered, for 30-35 mins or until thickened and reduced. Season. For a really smooth sauce, blitz with a stick blender, otherwise leave as is.

    5) Stir the basil into the sauce. The sauce will cover 4-6 large pizza bases. Keeps well in the fridge for 1 week or stored in a container in the freezer.

    6) Preheat the oven to its highest setting.

    7) Divide the dough into six balls and roll each out on a lightly floured work surface until 20cm/8in in diameter. (You can also make one big pizza.) Spread a little passata (or homemade tomato sauce) over each pizza base and top with your favourite toppings.

    8) Bake the pizzas in the oven for 10-12 minutes until the bases are crisp and golden brown around the edges and any cheese on top has melted.
- name: Quesadillas
  ingredients:
    - Chicken 220 g
    - Tortilla 4 unit
    - Garlic 2 clove
    - Pepper 1 medium
    - Cumin 2 tsp
    - Paprika 1 tsp
    - Oregano 2 tsp
    - BBQ sauce 2 tbsp
    - Cheddar 100 g
    - Rice 90 g
    - Oil 3 tbsp
  instructions: |
    1) Cook the long grain rice. Meanwhile pepare, pepper and garlic.

    2) Fry the pepper. Add the chicken and garlic once the onion is softened.

    3) Add cumin, paprika, oregano and BBQ sauce.

    4) Construct the quesadillas with the rice, sauce, grated cheddar. Fry in some oil until browned on both sides.
- name: Mushroom risotto
  ingredients:
    - Vegetable stock 800 ml
    - Butter 50 g
    - Oil 3 tbsp
    - Onion 1 medium
    - Garlic 1 clove
    - Arborio rice 150 g
    - White wine 150 ml
    - Parsley 2 tbsp
    - Mushrooms 300 g
    - Parmesan 50 g
    - Garlic Bread 0.5 unit
  instructions: |
    1) Heat the stock in a small pan and keep it gently simmering. Heat the butter and olive oil in a large pan. Add the onion and garlic, and cook over a medium heat for 4-5 minutes, stirring, until softened.

    2) Using a wooden spoon, stir in the rice and coat it with the buttery onions. Add the wine and simmer until almost evaporated. Stir in a ladleful of hot stock. Cook, stirring occasionally, until it has been absorbed into the rice.

    3) Continue adding the hot stock a ladleful at a time, stirring occasionally, for about 20 minutes or until the risotto is tender and creamy. Stir in the herbs, then season to taste.

    5) Add 2 tsp olive oil and 300g sliced chestnut mushrooms and stir-fry over a high heat for 4-5 minutes or until tender.

    6) When the risotto is cooked, stir in the mushrooms with their juices. Spoon onto warmed plates and scatter with the Parmesan cheese.
- name: Pulled Pork Jackets
  ingredients:
    - Pulled Pork 1 unit
    - Jacket Potato 2 units
    - Lettuce 0.5 units
    - Parmesan 10 g
    - Croutons 15 units
    - Caesar Dressing 100 ml
    - Olive oil 3 tbsp
  instructions: |
    1) Turn the oven to 180 C. Meanwhile, soften the potatoes in the microwave.

    2) Once heated, place the pulled pork into the oven for 25 minutes. Prepare the lettuce.

    3) Once soften and cooled slightly, smear the potatoes with olive oil and place them in the oven when the pork has 10 minutes left.

    4) Take the pork out of the oven, drain the excess fat, add the BBQ and place back into the oven for 5 minutes.
- name: Roast Chicken
  ingredients:
    - Whole Chicken 1.9 kg
    - Potatoes 8 units
    - Oil 4 tbsp
    - Plain flour 70 g
    - Eggs 2 large
    - Milk 100 ml
    - Carrots 8 units
    - Green beans 100 g
    - Chicken stock 400 ml
  instructions: |
    1) See note on phone.
- name: Sausage and Mash
  ingredients:
    - Sausage 4 unit
    - Potato 300 g
    - Butter 100 g
    - Plain flour 50 g
    - Milk 50 ml
    - Onion 0.5 small
    - Beef stock 250 ml
    - Broccoli 0.5 head
    - Green beans 100 g
  instructions: |
    1) Heat the oven to 180 C. Whilst waiting, prepare the veg and place it in the steamer. Cook the sausages for 25 minutes.

    2) Start boiling some water and placed chopped potatoes inside

    3) Thinly slice half an onion and fry in butter and some sugar for 10 minute

    4) Once softened, add flour to the melted butter until a roux forms. Slowly whisk in some beef stock until the gravy is the right consistenc

    5) Blend the gravy with a stick blender until smooth.

    6) Once the potatoes are soft, drain, add butter and milk, season then mash.
- name: Stuffed pasta bake bolognese
  ingredients:
    - Oil 1 tbsp
    - Onion 1 medium
    - Carrot 1 large
    - Beef mince 400 g
    - Garlic 5 cloves
    - Red wine 250 ml
    - Tomato puree 1 tbsp
    - Bay leaf 3 unit
    - Chopped tomato 2 tin
    - Sugar 1 pinch
    - Balsamic vinegar 2 tsp
    - Large pasta shells 250 g
    - Mascarpone 200 g
    - Mozzarella 250 g
    - Basil 1 bunch
    - Parmesan 10 g
  instructions: |-
    1) To make the bolognese, heat the oil in a wide ovenproof pan over a medium heat. Fry the onion and carrot with some seasoning for 20 mins until soft and lightly golden. Tip in the beef mince, turn up the heat and fry, stirring regularly, for another 10 mins until the mince browns.
    2) Add the garlic, fry for a minute, then pour in the wine and bubble for a few mins more, scraping the pan to release any bits. Stir through the purée, bay leaves and tomatoes, with a canful of water. Simmer for 1½ hrs, covered for the first hour, then remove the lid and bubble until the tomatoes have broken down. Season with salt, pepper, the sugar and balsamic vinegar.
    3) Tip the pasta shells into a large heatproof bowl with a pinch of salt, and pour over a kettle of boiled water. Cover and leave to soften for 15-20 mins - they need to retain some firmness so you can fill them.
    4) Heat the oven to 200C/180C fan/gas 4 and drain the pasta. Use a fork to mash the mascarpone with the mozzarella, chopped basil, garlic and some black pepper in a bowl.
    5) The bolognese should be a little wetter than you'd like as the pasta shells will absorb some of the liquid as it bakes. Remove from the heat, giving it a final stir. Using a teaspoon, fill the pasta shells with some of the mascarpone mixture, pressing the mix in with your index finger. Nestle the shells into the sauce, filled-side up. Bake for 20-30 mins until the top is golden and bubbling, and the pasta is tender. Grate over some parmesan and finish with a few basil leaves.
- name: Tomato pasta
  ingredients:
    - Chicken 200 g
    - Onion 1 small
    - Garlic 2 clove
    - Pepper 0.5 unit
    - Mushrooms 100 g
    - Courgette 0.5 unit
    - Chopped tomato 1 tin
    - Tomato puree 1 tbsp
    - Oregano 1 tsp
    - Basil 1 tsp
    - Thyme 1 tsp
    - Paprika 1 tsp
    - Sugar 0.5 tsp
    - Pasta 140 g
  instructions: |-
    1) Start with the onions and garlic. Once softened, fry off some pepper and leftover chicken. Add mushrooms once the chicken is browned.
    2) Add a tin of chopped tomatoes and some tomato puree. Season and add oregano, basil, thyme, paprika and some sugar.
    3) Leaving the sauce to reduce, start cooking the pasta.
    4) Once the pasta is cooked, add it to the sauce, top with parmesan and serve.
- name: Burger and Chips
  ingredients:
    - Burger 2 units
    - Lettuce 0.5 units
    - Cheese 4 slices
    - Bun 1 unit
    - Potato 300 g
    - Croutons 20 g
    - Caesar dressing 100 ml
    - Parmesan 10 g
  instructions: |-
    1) Par boil the hand cut potato for 6 minutes. Drain and dry thoroughly.
    2) Place in an oiled baking sheet which has been pre-heating in a 200 C oven. Cook for 34 minutes.
    3) Place the burgers on a chopping board and season with salt.
    4) Chop and wash the lettuce.
    5) With 21 minutes to go on the chips, start heating the oil in a griddle pan.
    6) After 3 minutes, start frying the burgers. 3 minutes a side, don't touch them whilst they fry.
    7) With 5 minutes to go, remove the burgers from the pan and place the cheese slices on them. Place them in a warm oven to melt the cheese.
    8) Fry the bun in the burger fat.
    9) Construct the salad and serve.
- name: Chicken Mushroom Pasta
  ingredients:
    - Chicken 300 g
    - Single cream 150 ml
    - Mushrooms 8 units
    - Shallot 1 unit
    - Garlic 3 cloves
    - Butter 30 g
    - Parmesan 50 g
    - Pasta 150 g
    - White wine 50 ml
  instructions: |-
    1) Bring a pan of water to the boil. Add a little splash of olive oil and the pasta. Cook for 8 minutes or until al dente. Drain and return to the pan. Pre-heat the oven to 200°C.
    2) Fry the chicken thigh pieces until cooked. Remove them from the frying pan.
    3) For the sauce, add the butter to the pan along with the finely diced shallot. Add in the mushrooms. Fry for a few minutes until the onions are translucent but not browning. Add the garlic, crushed. Stir for a further minute or so until you can smell the garlic. Add the white wine and cook off. Reduce the heat and pour in the cream. Mix well. Season with salt and pepper and allow to reduce very slightly so that the cream thickens a bit and is slightly sticking to the spoon.
    4) Stir in the the chicken and pasta. When mixed add about a quarter of the parmesan cheese by grating this in directly. Cook for another minute or two. The texture should be sticky and the chicken and pasta should both be starting be covered in the sauce.
    5) Dish into oven-proof dish(es) and cover with foil. Pop into the oven and leave for 15 minutes. Take out of the oven and carefully remove the foil. Grate over about half of the remaining parmesan liberally and return to the oven for a another 10 minutes before removing and serving with a final further helping of parmesan on the top and pepper to taste.
- name: Pie and Mash
  ingredients:
    - Pie 1 unit
    - Potato 300 g
    - Butter 50 g
    - Milk 50 ml
    - Onion 0.5 small
    - Flour 25 g
    - Green beans 100 g
    - Beef stock 350 ml
  instructions: |-
    1) Heat the oven to 180 C. Whilst waiting, prepare the veg and place it in the steamer. Cook the Pie for 35 minutes.

    2) Start boiling some water and placed chopped potatoes inside

    3) Thinly slice half an onion and fry in butter and some sugar for 10 minute

    4) Once softened, add flour to the melted butter until a roux forms. Slowly whisk in some beef stock until the gravy is the right consistency.

    5) Blend the gravy with a stick blender until smooth.

    6) Once the potatoes are soft, drain, add butter and milk, season then mash.
- name: Mexican Chicken & Rice One Pot
  ingredients:
    - Chicken breast 600 g
    - Garlic 3 cloves
    - Red pepper 1 unit
    - Yellow pepper 1 unit
    - Cumin 2 tsp
    - Paprika 2 tsp
    - Rice 200 g
    - Passata 500 g
    - Chicken stock 500 ml
    - Black beans 400 g
    - Grated cheese 75 g
  instructions: |-
    1) Heat the oil in a large saucepan and add the chicken. Stir for 5 minutes, until coloured all over.
    2) Add the garlic, peppers, cumin, chilli, paprika, continue to stir for a further 1-2 minutes just until everything is well coated in the spices.
    3) Add the rice, passata, stock, black beans and salt and pepper and bring to a simmer. Pop the lid on the cook for 15-20 minutes until the rice has absorbed the stock and is cooked.
    4) Add the cheese and pop the pan under the grill for about 5 minutes until it's melted. Sprinkle over spring onion if using, and serve.
- name: Beef Orzo
  ingredients:
    - Beef 400 g
    - Puree 2 tbsp
    - Onion 1 unit
    - Beef stock 300 ml
    - Chopped Tomatoes 1 can
    - Carrots 3 units
    - Red wine 100 ml
    - Mixed spice 1 tsp
    - Cinnamon 1 tsp
    - Bay leaves 3 units
    - Oregano 1 tsp
    - Basil 1 tsp
    - Parsley 1 tsp
    - Garlic 4 cloves
    - Orzo 330 g
    - Beef stock 700 ml
  instructions: |-
    1) Add everything to the slowcooker with exception of the orzo and additional stock. Cook on high for 3 hours.

    2) Add the orzo and additional stock and cook on high for 45 mins
- name: Meatball Gnocchi
  ingredients:
    - Meatballs 12 units
    - Red pepper 1 unit
    - Garlic 2 cloves
    - Chopped tomatoes 1 tin
    - Beef stock 100 ml
    - Worcestershire sauce 1 tbsp
    - Oregano 1 tsp
    - Gnocchi 300 g
    - Peas 70 g
    - Cheddar 40 g
    - Mozzarella 40 g
  instructions: |-
    1. Put the oil and meatballs in a large pan or casserole dish that's suitable to be used on the hob or the grill.
    2. Cook for 5 minutes, turning the meatballs regularly to brown on all sides.
    3. Add the red pepper and garlic and cook for another minute.
    4. Add the chopped tomatoes, beef stock, Worcestershire sauce and oregano.
    5. Bring to the boil and simmer for 10 minutes.
    6. Add the gnocchi and peas and cook for a further
    5 minutes, stirring a few times.
    7. Sprinkle the Cheddar and mozzarella on top and place the pan under the grill for 4-5 minutes until nicely browned.
- name: Chicken Nuggets
  ingredients:
    - Chicken Breasts 2 units
    - Eggs 2 units
    - Flour 50 g
    - Panko breadcrumbs 80 g
    - Garlic powder 0.5 teaspoons
    - Smoked paprika 0.5 teaspoons
    - Potatoes 700 g
    - Peas 80 g
  instructions: |-
    1) Combine the flour, garlic powder, paprika, ½-1 tsp salt and a few cracks of freshly ground black pepper on a plate. Tip the beaten egg onto another plate and the breadcrumbs onto a third.

    2) Toss the chicken pieces in the flour mix, then the egg, and finally the breadcrumbs. Set aside on a tray. Heat the oven to 200C, then cook the chicken nuggets in a single layer (you may need to do this in batches) for 12-14 mins until cooked through and golden brown.

    3) Cook the chips as usual.
- name: Pesto Prawn Pasta
  ingredients:
    - Prawns 150 g
    - Shallots 1 unit
    - Garlic 1 clove
    - Spinach 120 g
    - Pesto 0.5 jar
    - Parmesan 125 g
    - Cherry Tomatoes 8 units
    - Fresh pasta 250 g
  instructions: |
    1) Fry the shrimp in a wok or large pan with oil. Just before the shrimp are done, add the finely chopped onion and chopped garlic and fry lightly.

    2) Deglaze with cream and bring to a boil briefly.

    3) Add the pesto and spinach and simmer gently.

    4) To thicken the sauce, add 150g Parmesan cheese and simmer briefly.

    5) Cook the tagliatelle according to the instructions, drain, and add it to the sauce. Mix thoroughly and serve on plates.

    6) Spread the halved tomatoes and the remaining Parmesan cheese over the pasta.
- name: Sausage and Chips
  ingredients:
    - Sausages 6 units
    - Potato 800 g
    - Peas 100 g
    - Beans 1 tin
  instructions: |-
    1) Par boil the hand cut potato for 6 minutes. Drain and dry thoroughly.

    2) Cook the sausages for 30 minutes in a pre-heated oven.

    3) Place in an oiled baking sheet which has been pre-heating in a 205 C air fryer. Cook for 22 minutes.

    5) Towards the end, microwave the beans and peas
